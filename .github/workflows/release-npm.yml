name: Release Packages to npm

on:
  workflow_run:
    workflows:
      - CI - Build, Test and Coverage
    types:
      - completed
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-npm
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    if: |
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'main') ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Validate package.json encoding (no BOM)
        run: yarn check:bom

      - name: Build all packages
        run: yarn build

      - name: Run tests
        run: yarn test

      - name: Validate NPM_TOKEN secret
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "NPM_TOKEN secret is not configured. Configure it in repository secrets before running release."
            exit 1
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify npm authentication
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Check if core version already exists
        id: core_check
        run: |
          PACKAGE_NAME=$(node -p "require('./packages/applepay-core/package.json').name")
          PACKAGE_VERSION=$(node -p "require('./packages/applepay-core/package.json').version")

          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Skipping publish for ${PACKAGE_NAME}@${PACKAGE_VERSION} (already published)."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Publishing ${PACKAGE_NAME}@${PACKAGE_VERSION}."
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish core package
        if: steps.core_check.outputs.exists != 'true'
        run: npm publish --access public
        working-directory: packages/applepay-core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Check if adapter version already exists
        id: adapter_check
        run: |
          PACKAGE_NAME=$(node -p "require('./packages/applepay-adapter-vtex/package.json').name")
          PACKAGE_VERSION=$(node -p "require('./packages/applepay-adapter-vtex/package.json').version")

          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Skipping publish for ${PACKAGE_NAME}@${PACKAGE_VERSION} (already published)."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Publishing ${PACKAGE_NAME}@${PACKAGE_VERSION}."
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish adapter package
        if: steps.adapter_check.outputs.exists != 'true'
        run: npm publish --access public
        working-directory: packages/applepay-adapter-vtex
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Check if react version already exists
        id: react_check
        run: |
          PACKAGE_NAME=$(node -p "require('./packages/applepay-react/package.json').name")
          PACKAGE_VERSION=$(node -p "require('./packages/applepay-react/package.json').version")

          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Skipping publish for ${PACKAGE_NAME}@${PACKAGE_VERSION} (already published)."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Publishing ${PACKAGE_NAME}@${PACKAGE_VERSION}."
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish react package
        if: steps.react_check.outputs.exists != 'true'
        run: npm publish --access public
        working-directory: packages/applepay-react
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}




